<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Lista de Compras</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:Arial;
background:#012b20;
}

body{
position:fixed;
inset:0;
}

/* MENU */

.menu{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
padding:20px;
background:#012b20;
}

.botao{
width:100%;
max-width:340px;
background:white;
padding:24px;
border-radius:22px;
font-size:26px;
text-align:center;
font-weight:bold;
box-shadow:0 8px 20px rgba(0,0,0,.20);
}

/* IFRAME */

iframe{
position:fixed;
top:0;
left:0;
width:100vw;
height:100dvh;
border:none;
display:none;
background:#012b20;
z-index:999;
}

</style>

</head>

<body>

<div id="menu" class="menu">

<div class="logo">
🛒 Lista de Compras
</div>

<div class="botao" onclick="abrir('montar')">
➕ Montar Lista
</div>

<div class="botao" onclick="abrir('comprar')">
🛍️ Fazer Compras
</div>

</div>

<iframe id="appFrame"></iframe>

<script>

const BASE =
"https://script.google.com/macros/s/AKfycbzPgUEc3hEhN842CZ0KcPDQJCHdGiWQlenNDBi-TLcHBBvjk_lRmtoEtTpI-C64LSV4/exec";

function abrir(pagina){

document.getElementById("menu").style.display="none";

const frame = document.getElementById("appFrame");

frame.src = BASE + "?page=" + pagina;

frame.style.display = "block";

}

/* função futura para voltar */
function voltarMenu(){
document.getElementById("menu").style.display="flex";
document.getElementById("appFrame").style.display="none";
document.getElementById("appFrame").src="";
}

</script>

</body>
</html>
