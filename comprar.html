<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/comprar.css">

<title>Comprar</title>
</head>

<body>

<div class="page">

  <!-- TOPO -->
  <div class="topo">
    <button class="voltar" onclick="voltarHome()">
      <i class="fa-solid fa-arrow-left"></i>
    </button>
    <h2>🛒 Comprar Itens</h2>
  </div>

  <!-- CARD PRINCIPAL -->
  <div class="card">
    
    <!-- OCULTAR/ATIVAR ITENS -->
    <div class="filtro-box">
      <label class="switch">
        <input type="checkbox" id="toggleComprados" checked onchange="filtrarComprados()">
        <span class="slider"></span>
      </label>
      <span id="labelFiltro">Mostrar comprados</span>
    </div>

    <!-- FILTRO -->
    <div class="busca-box">

      <input type="text" id="buscaItem" placeholder="🔍 Buscar item..." oninput="filtrarLista()" />
      
      <button class="btn-filtro" onclick="toggleFiltro()">
        <i class="fa-solid fa-sliders"></i>
      </button>
      <div id="menuFiltro" class="menu-filtro hidden">
        <div onclick="setOrdenacao('nome_asc')">Nome (A → Z)</div>
        <div onclick="setOrdenacao('nome_desc')">Nome (Z → A)</div>
        <div onclick="setOrdenacao('qtd_asc')">Qtd (menor → maior)</div>
        <div onclick="setOrdenacao('qtd_desc')">Qtd (maior → menor)</div>
      </div>
    
    </div>

    <!-- LISTA -->
    <div id="listaCompra"></div>

  </div>

</div>

<!-- LOADING GLOBAL -->
<div id="loading" class="loading">
  <div class="spinner"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/app.js"></script>
<script src="js/comprar.js"></script>

</body>
</html>
