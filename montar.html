<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
<title>Montar Lista</title>
</head>

<body>

<div class="page">

<div class="topo">
<button class="voltar" onclick="location.href='index.html'">⬅</button>
<h2>📝 Montar Lista</h2>
</div>

<div class="card">

<div id="menuInicial">

<button class="acao" onclick="modoNovaLista()">
➕ Nova Lista
</button>

<select id="comboListas" class="campo" onchange="selecionarLista()">
<option value="">📂 Carregar lista existente</option>
</select>

</div>

<div id="areaNova" style="display:none">

<input id="nomeLista" class="campo" placeholder="Nome da nova lista">

<button class="acao" onclick="criarLista()">
Criar Lista
</button>

<button class="outline acao" onclick="cancelarNovaLista()">
Cancelar
</button>

</div>

<div id="listaAtiva" style="display:none"></div>

</div>

<div class="card" id="areaItens" style="display:none">
<div id="itens"></div>

<button class="danger" onclick="limparLista()">
🧹 Limpar Lista
</button>
</div>

</div>

<script src="app.js"></script>
<script src="montar.js"></script>

<div id="loading" class="loading oculto">
    <div class="spinner"></div>
</div>
</body>
</html>
