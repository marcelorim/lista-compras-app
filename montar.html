<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
<title>Montar Lista</title>
</head>

<body>

<div class="page">

<div class="topo">
<button class="voltar" onclick="location.href='index.html'">⬅</button>
<h2>📝 Montar Lista</h2>
</div>

<div class="card">

<input class="campo" placeholder="Nome da Lista">

<button class="acao">➕ Nova Lista</button>

<button class="acao outline">📂 Carregar Lista</button>

</div>

<div class="card">

<div class="linha-item">
<span>Arroz</span>
<div class="acoes-item">
<button>-</button>
<span>2</span>
<button>+</button>
</div>
</div>

<div class="linha-item">
<span>Feijão</span>
<div class="acoes-item">
<button>-</button>
<span>1</span>
<button>+</button>
</div>
</div>

<div class="linha-item">
<span>Macarrão</span>
<div class="acoes-item">
<button>-</button>
<span>3</span>
<button>+</button>
</div>
</div>

</div>

</div>

</body>
</html>
